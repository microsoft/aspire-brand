<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Aspire Brand Kit</title>
  <desc id="desc">Aspire logo with Brand Kit title and a short description of official logos, colors, guidance, and presentation assets.</desc>
  <defs>
    <linearGradient id="bg" x1="88" y1="64" x2="1120" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FAFAFF"/>
      <stop offset="0.45" stop-color="#F5F1FF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <radialGradient id="glowPurple" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(288 148) rotate(33.8) scale(316 245)">
      <stop stop-color="#7455DD" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#7455DD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1018 126) rotate(141.4) scale(250 188)">
      <stop stop-color="#0078D7" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0078D7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowFlamingo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(920 528) rotate(-147.3) scale(298 215)">
      <stop stop-color="#F65163" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#F65163" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="72" y1="70" x2="1118" y2="592" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.76"/>
    </linearGradient>
    <linearGradient id="cardGlow" x1="116" y1="128" x2="356" y2="384" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F6F0FF"/>
    </linearGradient>
    <linearGradient id="pill" x1="412" y1="458" x2="714" y2="458" gradientUnits="userSpaceOnUse">
      <stop stop-color="#512BD4"/>
      <stop offset="1" stop-color="#7455DD"/>
    </linearGradient>
    <linearGradient id="miniCardStroke" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#CFC7F7"/>
      <stop offset="1" stop-color="#B7D6F4"/>
    </linearGradient>
    <filter id="blur48" x="-120" y="-120" width="1440" height="870" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="48"/>
    </filter>
    <filter id="shadow" x="46" y="40" width="1128" height="566" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="16"/>
      <feGaussianBlur stdDeviation="24"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.247059 0 0 0 0 0.192157 0 0 0 0 0.501961 0 0 0 0.12 0"/>
      <feBlend in="SourceGraphic" result="shape"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
