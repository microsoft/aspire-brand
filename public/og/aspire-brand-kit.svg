  <text x="412" y="292" fill="#1F1E33" font-family="Poppins, Avenir Next, Segoe UI, sans-serif" font-size="92" font-weight="700">Brand Kit</text>
  <text x="412" y="354" fill="#4D4C66" font-family="Poppins, Avenir Next, Segoe UI, sans-serif" font-size="31" font-weight="500">Official logos, palette references, brand guidance,</text>
